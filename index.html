<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWXC STORE</title>
    <style>
        :root {
            --gta-green: #1DB954;
            --white: #ffffff;
            --overlay: rgba(0, 0, 0, 0.6); 
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            /* صورة GTA 5 واضحة ورابط مباشر */
            background-image: linear-gradient(var(--overlay), var(--overlay)), 
                              url('https://images.alphacoders.com/441/441710.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--gta-green);
            color: black;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            z-index: 1000;
        }

        [dir="ltr"] .lang-switch { left: auto; right: 20px; }

        .header {
            padding: 50px 20px;
            text-align: center;
            background: rgba(0,0,0,0.85);
            border-bottom: 4px solid var(--gta-green);
            backdrop-filter: blur(10px);
        }

        .header h1 { font-size: 2.8rem; font-weight: 900; }
        .header p { color: var(--gta-green); font-size: 1.1rem; margin-top: 5px; font-weight: bold; }

        .container { padding: 25px; max-width: 500px; margin: auto; }

        .section-title {
            color: #000;
            background: var(--gta-green);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin: 30px 0 15px 0;
            font-weight: 900;
        }

        .item-card {
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid var(--gta-green);
            padding: 22px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            border-radius: 20px;
            transition: 0.2s;
        }

        .item-card:active {
            transform: scale(0.96);
            background: var(--gta-green);
            color: black;
        }

        .info h3 { font-size: 1.3rem; }
        .info p { font-size: 0.85rem; color: var(--gta-green); font-weight: bold; }

        .price-tag { font-size: 1.6rem; font-weight: 900; }

        .payment-info {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            padding: 25px;
            margin-top: 10px;
            border: 1px solid #333;
            text-align: center;
        }

        .region-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .region-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(29, 185, 84, 0.3);
            font-weight: bold;
        }

        .footer { text-align: center; padding: 60px 20px; color: #fff; font-size: 0.95rem; font-weight: bold; }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLang()" id="langBtn">English</button>

    <div class="header">
        <h1>PWXC STORE</h1>
        <p id="subTitle">مودات سيارات • الحصري عندنا</p>
    </div>

    <div class="container">
        
        <div class="section-title" id="pkgTitle">🚗 باقات السيارات</div>

        <a id="btn1" href="https://wa.me/96550900234?text=سلام عليكم حمود، ابي باقة 10 سيارات" class="item-card">
            <div class="info">
                <h3 id="card1Title">باقة 10 سيارات</h3>
                <p id="card1Desc">الأكثر طلباً • تسليم فوري</p>
            </div>
            <div class="price-tag">10$</div>
        </a>

        <a id="btn2" href="https://wa.me/96550900234?text=سلام عليكم حمود، ابي باقة 20 سيارة" class="item-card">
            <div class="info">
                <h3 id="card2Title">باقة 20 سيارة</h3>
                <p id="card2Desc">اختيارك الشخصي • تسليم سريع</p>
            </div>
            <div class="price-tag">20$</div>
        </a>

        <a id="btn3" href="https://wa.me/96550900234?text=سلام عليكم حمود، ابي باقة 30 سيارة" class="item-card">
            <div class="info">
                <h3 id="card3Title">باقة 30 سيارة</h3>
                <p id="card3Desc">باقة المجمّعين • حصري</p>
            </div>
            <div class="price-tag">30$</div>
        </a>

        <div class="section-title" id="payTitleHeader">💳 ريجن الستور المقبول</div>
        
        <div class="payment-info">
            <div class="region-list">
                <div class="region-item">🇸🇦 سعودي</div>
                <div class="region-item">🇰🇼 كويتي</div>
                <div class="region-item">🇺🇸 امريكي</div>
                <div class="region-item">🇦🇪 اماراتي</div>
            </div>
        </div>

        <div class="footer" id="footerText">
            جميع الحقوق محفوظة لشبكة حمود © 2026
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        function toggleLang() {
            const html = document.getElementById('html-tag');
            const btn = document.getElementById('langBtn');
            const regions = document.querySelectorAll('.region-item');
            
            if (currentLang === 'ar') {
                html.dir = 'ltr';
                btn.innerText = 'العربية';
                document.getElementById('subTitle').innerText = 'Vehicle Mods • Exclusive Content';
                document.getElementById('pkgTitle').innerText = '🚗 Car Bundles';
                document.getElementById('payTitleHeader').innerText = '💳 Accepted Regions';
                regions[0].innerText = '🇸🇦 Saudi';
                regions[1].innerText = '🇰🇼 Kuwait';
                regions[2].innerText = '🇺🇸 USA';
                regions[3].innerText = '🇦🇪 UAE';
                currentLang = 'en';
            } else {
                html.dir = 'rtl';
                btn.innerText = 'English';
                document.getElementById('subTitle').innerText = 'مودات سيارات • الحصري عندنا';
                document.getElementById('pkgTitle').innerText = '🚗 باقات السيارات';
                document.getElementById('payTitleHeader').innerText = '💳 ريجن الستور المقبول';
                regions[0].innerText = '🇸🇦 سعودي';
                regions[1].innerText = '🇰🇼 كويتي';
                regions[2].innerText = '🇺🇸 امريكي';
                regions[3].innerText = '🇦🇪 اماراتي';
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
